    <main>
        <h1>Entre em Contato</h1>
        <p>Preencha o formulário abaixo para me enviar uma mensagem:</p>
        
        <form id="formContato">
            <input type="text" id="nome" placeholder="Seu Nome" required>
            <input type="email" id="email" placeholder="Seu E-mail (ex: usuario@dominio.com)" required>
            <textarea id="mensagem" placeholder="Sua mensagem..." rows="5" required></textarea>
            <button type="submit" style="background-color: #27ae60; color: white; border: none; cursor: pointer; padding: 12px; font-weight: bold;">Enviar</button>
        </form>
    </main>
